name: CI Pipeline

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff pytest pydantic loguru
      - name: Lint with Ruff
        run: ruff check .
      - name: Run Sanity Tests
        run: pytest tests/